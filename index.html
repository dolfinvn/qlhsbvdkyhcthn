function instructorCaseReview(){let a=state.accounts.find(x=>x.id===state.user),list=state.students.filter(s=>s.instructorId===a.link);return title('Chấm bệnh án','Người hướng dẫn chấm từng bệnh án/hồ sơ chuyên môn của học viên')+cards(list,s=>{s.caseScores=s.caseScores||[];return `<b>${s.name}</b><div class="text-sm text-slate-500">${s.id} · Đã nộp ${s.recordsSubmitted}/${course(s.courseId).records} bệnh án</div><div class="grid md:grid-cols-4 gap-2 mt-3"><input id="caseName-${s.id}" class="border rounded-xl p-2" placeholder="Tên/mã bệnh án"><input id="caseScore-${s.id}" type="number" min="0" max="10" class="border rounded-xl p-2" placeholder="Điểm 0-10"><select id="caseResult-${s.id}" class="border rounded-xl p-2"><option value="Đạt">Đạt</option><option value="Chưa đạt">Chưa đạt</option></select><input id="caseNote-${s.id}" class="border rounded-xl p-2" placeholder="Nhận xét"></div><button onclick="saveCaseScore('${s.id}')" class="mt-3 bg-emerald-600 text-white rounded-xl px-3 py-2">Lưu chấm bệnh án</button><div class="mt-4 bg-slate-50 rounded-2xl p-3 text-sm"><b>Lịch sử chấm bệnh án</b>${s.caseScores.slice(0,5).map(x=>`<div class="border-b py-2">${x.time} · <b>${x.name}</b> · ${x.score}/10 · ${x.result} · ${x.note||''}</div>`).join('')||'<div class="text-slate-500 mt-2">Chưa chấm bệnh án.</div>'}</div>`})}
function saveCaseScore(id){let s=state.students.find(x=>x.id===id);s.caseScores=s.caseScores||[];let name=val('caseName-'+id),score=+val('caseScore-'+id),result=val('caseResult-'+id),note=val('caseNote-'+id);if(!name)return alert('Nhập tên/mã bệnh án');if(score<0||score>10)return alert('Điểm bệnh án từ 0 đến 10');s.caseScores.unshift({time:new Date().toLocaleString('vi-VN'),name,score,result,note});if(result==='Đạt')s.recordsSubmitted=Math.max(s.recordsSubmitted||0,s.caseScores.filter(x=>x.result==='Đạt').length);log('Người hướng dẫn chấm bệnh án',s.name+' - '+name+' - '+score+'/10 - '+result);save();render()}
function instructorCompetency(){let a=state.accounts.find(x=>x.id===state.user),list=state.students.filter(s=>s.instructorId===a.link);return title('Lượng giá lý thuyết, thực hành và mức độc lập','Mức độc lập 0-5; từ mức 3 trở lên mới tính là thực hành tốt dưới giám sát và đủ điều kiện thi qua môn')+`<div class="bg-blue-50 border border-blue-100 rounded-3xl p-4 mb-5 text-sm text-blue-800"><b>Thang mức độc lập:</b> 0 chưa thực hiện được · 1 quan sát · 2 làm từng phần cần kèm sát · <b>3 thực hành được dưới giám sát</b> · 4 thực hành chủ động có giám sát gián tiếp · 5 độc lập, thành thạo.</div>`+cards(list,s=>{s.competencies=s.competencies||[];s.subjectPasses=s.subjectPasses||[];let maxLevel=Math.max(...s.competencies.map(x=>+x.independentLevel||0),0);return `<b>${s.name}</b><div class="text-sm text-slate-500">${s.id} · ${course(s.courseId).name}</div><div class="grid md:grid-cols-5 gap-2 mt-3"><input id="subject-${s.id}" class="border rounded-xl p-2" placeholder="Môn/kỹ thuật"><input id="theory-${s.id}" type="number" min="0" max="10" class="border rounded-xl p-2" placeholder="Lý thuyết"><input id="practiceScore-${s.id}" type="number" min="0" max="10" class="border rounded-xl p-2" placeholder="Thực hành"><select id="level-${s.id}" class="border rounded-xl p-2"><option value="0">Mức 0</option><option value="1">Mức 1</option><option value="2">Mức 2</option><option value="3">Mức 3 - đạt dưới giám sát</option><option value="4">Mức 4</option><option value="5">Mức 5</option></select><input id="compNote-${s.id}" class="border rounded-xl p-2" placeholder="Nhận xét"></div><button onclick="saveCompetency('${s.id}')" class="mt-3 bg-purple-600 text-white rounded-xl px-3 py-2">Lưu lượng giá / xét qua môn</button><div class="mt-3 text-sm ${s.subjectPasses.length>=3&&maxLevel>=3?'text-green-700':'text-amber-700'}">Đã qua môn: <b>${s.subjectPasses.length}/3</b> · Mức độc lập cao nhất: <b>${maxLevel}/5</b></div><div class="mt-4 bg-slate-50 rounded-2xl p-3 text-sm"><b>Lịch sử lượng giá</b>${s.competencies.slice(0,5).map(x=>`<div class="border-b py-2">${x.time} · <b>${x.subject}</b> · LT ${x.theory}/10 · TH ${x.practice}/10 · Mức ${x.independentLevel}/5 · ${x.passed?'Qua môn':'Chưa qua môn'} · ${x.note||''}</div>`).join('')||'<div class="text-slate-500 mt-2">Chưa có lượng giá.</div>'}</div>`})}
function saveCompetency(id){let s=state.students.find(x=>x.id===id);s.competencies=s.competencies||[];s.subjectPasses=s.subjectPasses||[];let subject=val('subject-'+id),theory=+val('theory-'+id),practice=+val('practiceScore-'+id),independentLevel=+val('level-'+id),note=val('compNote-'+id);if(!subject)return alert('Nhập môn/kỹ thuật cần lượng giá');if(theory<0||theory>10||practice<0||practice>10)return alert('Điểm lý thuyết và thực hành từ 0 đến 10');let passed=theory>=5&&practice>=5&&independentLevel>=3;s.competencies.unshift({time:new Date().toLocaleString('vi-VN'),subject,theory,practice,independentLevel,note,passed});if(passed&&!s.subjectPasses.includes(subject))s.subjectPasses.push(subject);if(s.subjectPasses.length>=3&&Math.max(...s.competencies.map(x=>+x.independentLevel||0),0)>=3)s.status='Đủ điều kiện thi qua môn - chờ xét tốt nghiệp';log('Người hướng dẫn lượng giá qua môn',s.name+' - '+subject+' - '+(passed?'Qua môn':'Chưa qua môn'));save();render()}
function gradebookPage(){let acc=state.accounts.find(a=>a.id===state.user)||{};let list=state.role==='instructor'?state.students.filter(s=>s.instructorId===acc.link):(state.role==='student'?state.students.filter(s=>s.id===acc.link):state.students);let rows=list.map(s=>{let comps=s.competencies||[],cases=s.caseScores||[],passes=s.subjectPasses||[];let avgTheory=comps.length?(comps.reduce((sum,x)=>sum+(+x.theory||0),0)/comps.length).toFixed(1):'Chưa có';let avgPractice=comps.length?(comps.reduce((sum,x)=>sum+(+x.practice||0),0)/comps.length).toFixed(1):'Chưa có';let maxLevel=Math.max(...comps.map(x=>+x.independentLevel||0),0);let passedCases=cases.filter(x=>x.result==='Đạt').length;let finalOk=passes.length>=3&&maxLevel>=3;return `<tr class="border-b align-top"><td class="py-3 font-bold">${s.id}<div class="text-slate-500 font-normal">${s.name}</div></td><td>${course(s.courseId).name}<div class="text-xs text-slate-500">${dep(s.departmentId).name} · ${ins(s.instructorId).name}</div></td><td>${passedCases}/${course(s.courseId).records}<div class="text-xs text-slate-500">Bệnh án đạt</div></td><td>${avgTheory}</td><td>${avgPractice}</td><td>Mức ${maxLevel}/5</td><td>${passes.length}/3<div class="text-xs text-slate-500">${passes.join(', ')||'Chưa có môn đạt'}</div></td><td><span class="px-3 py-1 rounded-full text-xs font-bold ${finalOk?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}">${finalOk?'Đủ điều kiện qua môn':'Chưa đủ'}</span></td><td>${s.score||'Chưa nhập'}</td></tr>`}).join('');let detail=list.map(s=>{let comps=s.competencies||[],cases=s.caseScores||[];return `<div class="bg-white rounded-3xl p-5"><div class="flex justify-between gap-3 mb-3"><div><b class="text-lg">${s.name}</b><div class="text-sm text-slate-500">${s.id} · ${course(s.courseId).name}</div></div>${badge(s.status)}</div><div class="grid md:grid-cols-2 gap-4"><div class="bg-slate-50 rounded-2xl p-3"><b>Lịch sử lượng giá</b>${comps.map(x=>`<div class="border-b py-2 text-sm">${x.time} · <b>${x.subject}</b> · LT ${x.theory}/10 · TH ${x.practice}/10 · Mức ${x.independentLevel}/5 · ${x.passed?'Qua môn':'Chưa qua'}</div>`).join('')||'<div class="text-slate-500 text-sm mt-2">Chưa có lượng giá.</div>'}</div><div class="bg-slate-50 rounded-2xl p-3"><b>Lịch sử chấm bệnh án</b>${cases.map(x=>`<div class="border-b py-2 text-sm">${x.time} · <b>${x.name}</b> · ${x.score}/10 · ${x.result} · ${x.note||''}</div>`).join('')||'<div class="text-slate-500 text-sm mt-2">Chưa chấm bệnh án.</div>'}</div></div></div>`}).join('');return title(state.role==='student'?'Bảng điểm của tôi':'Bảng điểm sau thi','Admin, người hướng dẫn và học viên xem bảng điểm tổng hợp sau lượng giá: bệnh án, lý thuyết, thực hành, mức độc lập, số lần qua môn và điểm tốt nghiệp')+`<div class="bg-white rounded-3xl p-5 mb-5 overflow-x-auto"><div class="flex flex-wrap gap-2 mb-4"><button onclick="exportGradebookCSV()" class="bg-emerald-600 text-white rounded-xl px-4 py-2 font-bold">Xuất CSV bảng điểm</button><button onclick="window.print()" class="bg-slate-900 text-white rounded-xl px-4 py-2 font-bold">In / lưu PDF</button></div><table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b"><th class="py-3">Mã/Học viên</th><th>Khóa/Khoa</th><th>Bệnh án</th><th>TB lý thuyết</th><th>TB thực hành</th><th>Mức độc lập</th><th>Qua môn</th><th>Kết luận</th><th>Điểm TN</th></tr></thead><tbody>${rows||'<tr><td class="py-4 text-slate-500" colspan="9">Không có dữ liệu.</td></tr>'}</tbody></table></div><div class="grid xl:grid-cols-2 gap-4">${detail||'<div class="text-slate-500">Không có dữ liệu.</div>'}</div>`}
function exportGradebookCSV(){let acc=state.accounts.find(a=>a.id===state.user)||{};let list=state.role==='instructor'?state.students.filter(s=>s.instructorId===acc.link):(state.role==='student'?state.students.filter(s=>s.id===acc.link):state.students);let csv='Ma HV,Hoc vien,Khoa,Khoa phong,Nguoi huong dan,Benh an dat,TB ly thuyet,TB thuc hanh,Muc doc lap,So lan qua mon,Diem tot nghiep,Ket luan\n'+list.map(s=>{let comps=s.competencies||[],cases=s.caseScores||[],passes=s.subjectPasses||[];let avgTheory=comps.length?(comps.reduce((sum,x)=>sum+(+x.theory||0),0)/comps.length).toFixed(1):'';let avgPractice=comps.length?(comps.reduce((sum,x)=>sum+(+x.practice||0),0)/comps.length).toFixed(1):'';let maxLevel=Math.max(...comps.map(x=>+x.independentLevel||0),0);let passedCases=cases.filter(x=>x.result==='Đạt').length;let finalOk=passes.length>=3&&maxLevel>=3?'Du dieu kien qua mon':'Chua du';return [s.id,s.name,course(s.courseId).name,dep(s.departmentId).name,ins(s.instructorId).name,passedCases,avgTheory,avgPractice,maxLevel,passes.length,s.score||'',finalOk].map(x=>'"'+x+'"').join(',')}).join('\n');let b=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='bang-diem-sau-thi.csv';a.click()}
function demoFlowPage(){let s=state.students[0],c=course(s.courseId);let steps=['Đăng ký','Nộp hồ sơ','Duyệt hồ sơ','Nộp học phí','Ký hợp đồng','Xếp lịch','Thực hành','Lượng giá','Thi tốt nghiệp','Giám đốc ký','Hoàn thành'];let current=0;if((s.docs||0)>=REQUIRED_DOCS.length)current=1;if(canShowPaymentQR(s))current=2;if(s.paid)current=3;if(s.signed)current=4;if(s.departmentId)current=5;if(s.status==='Đang thực hành')current=6;if((s.subjectPasses||[]).length>=3)current=7;if(s.score)current=8;if(s.submitted)current=9;if(s.certificate)current=10;return title('Demo quy trình 1 học viên','Màn trình lãnh đạo: bấm từng bước để mô phỏng toàn bộ quy trình từ đăng ký đến giám đốc ký')+`<div class="bg-white rounded-3xl p-5 mb-5"><div class="flex flex-wrap gap-2">${steps.map((x,i)=>`<div class="px-3 py-2 rounded-2xl text-sm font-bold ${i<=current?'bg-green-100 text-green-700':'bg-slate-100 text-slate-500'}">${i+1}. ${x}</div>`).join('')}</div></div><div class="grid xl:grid-cols-2 gap-4"><div class="bg-white rounded-3xl p-5"><h2 class="text-xl font-extrabold mb-3">Học viên demo</h2><p><b>${s.name}</b> · ${s.id}</p><p class="text-slate-500">${c.name} · ${dep(s.departmentId).name} · ${ins(s.instructorId).name}</p><div class="grid md:grid-cols-2 gap-3 mt-4"><div class="bg-blue-50 rounded-2xl p-3">Hồ sơ: <b>${s.docs||0}/${REQUIRED_DOCS.length}</b></div><div class="bg-emerald-50 rounded-2xl p-3">Học phí: <b>${s.paid?'Đã thu':'Chưa thu'}</b></div><div class="bg-purple-50 rounded-2xl p-3">Ngày công: <b>${s.attendance||0}/${c.attendance}</b></div><div class="bg-orange-50 rounded-2xl p-3">Bệnh án: <b>${s.recordsSubmitted||0}/${c.records}</b></div></div><div class="mt-4">${badge(s.status)}</div></div><div class="bg-white rounded-3xl p-5"><h2 class="text-xl font-extrabold mb-3">Nút chạy demo nhanh</h2><div class="grid md:grid-cols-2 gap-2"><button onclick="demoStep('docs')" class="bg-blue-600 text-white rounded-xl px-3 py-2">1. Nộp đủ hồ sơ</button><button onclick="demoStep('approve')" class="bg-green-600 text-white rounded-xl px-3 py-2">2. Duyệt hồ sơ</button><button onclick="demoStep('pay')" class="bg-emerald-600 text-white rounded-xl px-3 py-2">3. Xác nhận học phí</button><button onclick="demoStep('contract')" class="bg-indigo-600 text-white rounded-xl px-3 py-2">4. Ký hợp đồng</button><button onclick="demoStep('schedule')" class="bg-purple-600 text-white rounded-xl px-3 py-2">5. Xếp lịch</button><button onclick="demoStep('practice')" class="bg-cyan-600 text-white rounded-xl px-3 py-2">6. Hoàn tất thực hành</button><button onclick="demoStep('exam')" class="bg-orange-600 text-white rounded-xl px-3 py-2">7. Đạt thi tốt nghiệp</button><button onclick="demoStep('director')" class="bg-slate-900 text-white rounded-xl px-3 py-2">8. Giám đốc ký</button></div><div class="mt-4 bg-amber-50 border border-amber-100 rounded-2xl p-3 text-sm text-amber-800">Dùng màn này để trình bày quy trình. Sau này backend thật sẽ thay các nút demo bằng thao tác nghiệp vụ có phân quyền và chữ ký số.</div></div></div>`}
function demoStep(step){let s=state.students[0],c=course(s.courseId);s.documents=s.documents||{};s.docReview=s.docReview||{};if(step==='docs'){REQUIRED_DOCS.forEach(d=>{s.documents[d.key]={fileName:'demo-'+d.key+'.pdf',uploadedAt:new Date().toLocaleString('vi-VN')};s.docReview[d.key]='Hợp lệ'});s.docs=REQUIRED_DOCS.length;s.status='Đã nộp đủ hồ sơ chờ duyệt'}if(step==='approve'){s.paymentCode=paymentCode(s);s.status='Hồ sơ đã duyệt - chờ ký hợp đồng'}if(step==='pay'){s.paid=true;s.status='Đã đóng học phí - chờ ký hợp đồng'}if(step==='contract'){s.contractStatus='Đã ký hợp đồng';s.signed=true;s.status='Đã ký hợp đồng'}if(step==='schedule'){s.departmentId=s.departmentId||state.departments[2]?.id||state.departments[0].id;s.instructorId=s.instructorId||state.instructors[0].id;s.startDate=s.startDate||new Date().toISOString().slice(0,10);s.status='Đang thực hành'}if(step==='practice'){s.attendance=c.attendance;s.recordsSubmitted=c.records;s.status='Đang thực hành'}if(step==='exam'){s.competencies=s.competencies||[];s.subjectPasses=['Nội khoa','Kỹ năng giao tiếp','Quy trình chuyên môn'];s.competencies.unshift({time:new Date().toLocaleString('vi-VN'),subject:'Tổng hợp cuối khóa',theory:8,practice:8,independentLevel:4,note:'Demo đạt',passed:true});s.score=8;s.comment=true;s.submitted=true;s.status='Chờ giám đốc ký'}if(step==='director'){if(!s.submitted)return alert('Cần hoàn tất bước thi tốt nghiệp trước');s.certificate=true;s.status='Hoàn thành'}log('Chạy demo quy trình',s.name+' - '+step);save();render()}

 class="bg-white rounded-3xl p-5"><h2 class="text-xl font-extrabold mb-3">API backend tối thiểu</h2>${apis.map(a=>`<div class="border-b py-2 font-mono text-sm">${a}</div>`).join('')}<div class="mt-4 bg-blue-50 border border-blue-100 rounded-2xl p-3 text-sm text-blue-800"><b>Gợi ý triển khai:</b> backend Node/NestJS hoặc Laravel, database PostgreSQL/MySQL, lưu file bằng object storage nội bộ, chữ ký số tích hợp sau giai đoạn pilot.</div></div></div>`}

<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>

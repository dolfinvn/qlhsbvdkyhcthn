 {id:'HV260002',name:'Trần Thị Bình',phone:'0987654321',courseId:'c5',status:'Hồ sơ đã duyệt',docs:6,signed:false,paid:false,departmentId:'',instructorId:'',attendance:0,recordsSubmitted:0,score:'',comment:false,submitted:false,certificate:false}
];

 {id:'cl1',type:'Lớp chứng chỉ hành nghề',name:'CCHN YHCT khóa 01/2026',courseId:'c1',note:'Lớp thực hành chứng chỉ hành nghề YHCT'},
 {id:'cl2',type:'Lớp đào tạo liên tục',name:'ĐTLT YHCT 24 tiết khóa 01/2026',courseId:'cme24',note:'Lớp đào tạo liên tục y học cổ truyền'}
];
const seedAccounts=[
 {id:'u1',name:'Admin Phòng đào tạo',role:'admin',status:'Hoạt động',link:'',username:'admin',password:'123456'},
 {id:'u2',name:'Tài chính bệnh viện',role:'finance',status:'Hoạt động',link:'',username:'taichinh',password:'123456'},
 {id:'u3',name:'Giám đốc bệnh viện',role:'director',status:'Hoạt động',link:'',username:'giamdoc',password:'123456'},
 {id:'u4',name:'Nguyễn Văn An',role:'student',status:'Hoạt động',link:'HV260001',username:'0912345678',password:'123456'},
 {id:'u5',name:'ThS.BS. Lê Văn C',role:'instructor',status:'Hoạt động',link:'i1',username:'0901111222',password:'123456'}
];
let state={logged:false,user:null,role:'admin',page:'dashboard',q:'',courses:load('courses',DEFAULT_COURSES),students:load('students',seedStudents),departments:load('departments',seedDepartments),instructors:load('instructors',seedInstructors),classes:load('classes',seedClasses),accounts:load('accounts',seedAccounts),logs:load('logs',[]),cmeSchedules:load('cmeSchedules',[])};
COURSES=state.courses;
function load(k,seed){try{return JSON.parse(localStorage.getItem('bv_'+k+'_v9'))||seed}catch(e){return seed}}
function migrateData(){
 state.courses=state.courses&&state.courses.length?state.courses:JSON.parse(JSON.stringify(DEFAULT_COURSES));
 state.students=(state.students&&state.students.length?state.students:JSON.parse(JSON.stringify(seedStudents))).map(s=>({documents:{},docReview:{},attendanceLog:[],caseScores:[],competencies:[],subjectPasses:[],...s}));
 state.departments=state.departments&&state.departments.length?state.departments:JSON.parse(JSON.stringify(seedDepartments));
 state.instructors=state.instructors&&state.instructors.length?state.instructors:JSON.parse(JSON.stringify(seedInstructors));
 state.classes=state.classes&&state.classes.length?state.classes:JSON.parse(JSON.stringify(seedClasses));
 state.accounts=state.accounts&&state.accounts.length?state.accounts:JSON.parse(JSON.stringify(seedAccounts));
 seedAccounts.forEach(sa=>{if(!state.accounts.some(a=>a.username===sa.username||a.id===sa.id))state.accounts.push({...sa})});
 state.accounts=state.accounts.map(a=>{let linkedStudent=state.students.find(s=>s.id===a.link),linkedInstructor=state.instructors.find(i=>i.id===a.link);return {...a,username:a.username||a.phone||a.email||(linkedStudent?linkedStudent.phone:'')||(linkedInstructor?linkedInstructor.phone:'')||a.id,password:a.password||'123456',status:a.status||'Hoạt động'} });
 state.logs=state.logs||[];
 state.cmeSchedules=state.cmeSchedules||load('cmeSchedules',[]);state.graduatePracticeList=state.graduatePracticeList||load('graduatePracticeList',[]);
 COURSES=state.courses;
}
migrateData();
function save(){COURSES=state.courses;state.cmeSchedules=getCmeSchedules();['courses','students','departments','instructors','classes','accounts','logs','cmeSchedules','graduatePracticeList'].forEach(k=>localStorage.setItem('bv_'+k+'_v9',JSON.stringify(state[k])))}
function app(){return document.getElementById('app')}
function money(n){return new Intl.NumberFormat('vi-VN').format(n)+' đ'}
function paymentCode(s){return 'HP-'+s.id+'-'+(s.phone||'').slice(-4)}
function canShowPaymentQR(s){return ['Hồ sơ đã duyệt - chờ ký hợp đồng','Hồ sơ đã duyệt','Đã ký hợp đồng','Đã đóng học phí','Đang thực hành','Đủ điều kiện thi','Chờ giám đốc ký','Hoàn thành'].includes(s.status)||s.signed}
function qrUrl(s){let c=course(s.courseId);let info=encodeURIComponent('NOP HOC PHI '+paymentCode(s)+' '+s.name);return 'https://img.vietqr.io/image/970415-123456789012-compact2.png?amount='+c.fee+'&addInfo='+info+'&accountName=BENH%20VIEN'}
function course(id){return COURSES.find(x=>x.id===id)||COURSES[0]}
function dep(id){return state.departments.find(x=>x.id===id)||{name:'Chưa xếp khoa',quota:0}}
function ins(id){return state.instructors.find(x=>x.id===id)||{name:'Chưa có người hướng dẫn'}}
function cls(id){return (state.classes||[]).find(x=>x.id===id)||{name:'Chưa phân lớp',type:'Chưa phân lớp'}}
function val(id){return (document.getElementById(id)?.value||'').trim()}
function roleName(r){return {admin:'Admin / Phòng đào tạo',finance:'Tài chính',director:'Ban giám đốc',student:'Học viên',instructor:'Người hướng dẫn / Khoa',nurseChief:'Điều dưỡng trưởng / Chấm công khoa'}[r]||r}
function badge(s){return `<span class="px-2 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700">${s}</span>`}
function log(action,target){state.logs.unshift({time:new Date().toLocaleString('vi-VN'),user:(state.accounts.find(a=>a.id===state.user)||{}).name||'Hệ thống',action,target});save()}
function go(p){state.page=p;render()}
function normLogin(x){return String(x||'').trim().toLowerCase().replace(/\s+/g,'')}
function accountKeys(a){let s=state.students.find(x=>x.id===a.link)||{},i=state.instructors.find(x=>x.id===a.link)||{};return [a.username,a.email,a.phone,a.id,a.name,s.phone,s.email,s.id,i.phone,i.id].filter(Boolean).map(normLogin)}
function login(id){migrateData();let input=normLogin(val('loginUsername'));let a=id?state.accounts.find(x=>x.id===id):state.accounts.find(x=>accountKeys(x).includes(input)); if(!input&&!id)return alert('Vui lòng nhập tài khoản hoặc số điện thoại'); if(!a)return alert('Không tìm thấy tài khoản. Vui lòng kiểm tra lại tên đăng nhập/số điện thoại hoặc liên hệ Phòng đào tạo để được hỗ trợ.'); if(a.status==='Khóa')return alert('Tài khoản đang bị khóa. Vui lòng liên hệ phòng đào tạo/admin để mở khóa.'); let pw=id?val('pw-'+id):val('loginPassword'); if(!pw)return alert('Vui lòng nhập mật khẩu'); if(pw!==(a.password||'123456'))return alert('Sai mật khẩu. Vui lòng kiểm tra lại hoặc dùng chức năng quên mật khẩu.'); state.logged=true;state.user=a.id;state.role=a.role;state.page='dashboard';save();render()}
function forgotPassword(){let input=normLogin(val('loginUsername'));if(!input)return alert('Nhập tài khoản/số điện thoại trước, hệ thống sẽ gợi ý xử lý.');let a=state.accounts.find(x=>accountKeys(x).includes(input));if(!a)return alert('Không tìm thấy tài khoản để đặt lại mật khẩu. Có thể bấm Khôi phục dữ liệu mẫu nếu đang chạy demo.');alert('MVP demo: mật khẩu hiện tại của tài khoản này là '+(a.password||'123456')+'. Khi triển khai thật sẽ gửi OTP/SMS hoặc yêu cầu admin đặt lại mật khẩu.')}
function logout(){state.logged=false;state.user=null;render()}
function resetDemo(){
  if(confirm('Khôi phục dữ liệu mẫu?')){
    // Không clear localStorage để không mất accounts (đặc biệt mật khẩu bạn vừa đổi)
    const currentAccounts = (state && state.accounts)
      ? JSON.parse(JSON.stringify(state.accounts))
      : [];

    state = {
      logged:false,
      user:null,
      role:'admin',
      page:'dashboard',
      q:'',
      courses: JSON.parse(JSON.stringify(DEFAULT_COURSES)),
      students: JSON.parse(JSON.stringify(seedStudents)),
      departments: JSON.parse(JSON.stringify(seedDepartments)),
      instructors: JSON.parse(JSON.stringify(seedInstructors)),
      classes: JSON.parse(JSON.stringify(seedClasses)),

      // QUAN TRỌNG: giữ accounts hiện tại (giữ tài khoản học viên vừa đăng ký)
      accounts: currentAccounts,

      logs:[],
      cmeSchedules:[]
    };

    save();
    render();
  }
}

class="space-y-4"><div><label class="block text-sm font-bold text-slate-600 mb-2">Tài khoản / số điện thoại</label><input id="loginUsername" class="border rounded-2xl p-4 w-full text-lg focus:outline-none focus:ring-4 focus:ring-blue-100" placeholder="Ví dụ: admin hoặc 0912345678" onkeydown="if(event.key==='Enter')document.getElementById('loginPassword').focus()"></div><div><label class="block text-sm font-bold text-slate-600 mb-2">Mật khẩu</label><input id="loginPassword" type="password" class="border rounded-2xl p-4 w-full text-lg focus:outline-none focus:ring-4 focus:ring-blue-100" placeholder="Nhập mật khẩu" onkeydown="if(event.key==='Enter')login()"></div><button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-2xl px-5 py-4 font-extrabold text-lg">Đăng nhập</button><div class="grid sm:grid-cols-2 gap-2"><button onclick="forgotPassword()" class="border rounded-2xl px-4 py-3 font-bold text-slate-700 hover:bg-slate-50">Quên mật khẩu</button><button onclick="resetDemo()" class="border border-amber-200 bg-amber-50 text-amber-800 rounded-2xl px-4 py-3 font-bold">Khôi phục dữ liệu mẫu</button></div></div><div class="mt-6 bg-slate-50 border rounded-3xl p-4"><div class="flex items-center justify-between gap-3 mb-3"><b>Tài khoản demo nhanh</b><span class="text-xs bg-blue-100 text-blue-700 rounded-full px-3 py-1 font-bold">Mật khẩu: 123456</span></div><div class="grid sm:grid-cols-2 gap-2">${demo.map(d=>`<button onclick="document.getElementById('loginUsername').value='${d[1]}';document.getElementById('loginPassword').value='123456'" class="text-left border bg-white hover:bg-blue-50 rounded-2xl p-3"><b>${d[0]}</b><div class="text-sm text-slate-500">${d[1]}</div></button>`).join('')}</div></div><div class="mt-5 text-sm text-slate-500">Khi triển khai thật: có thể thêm quên mật khẩu, OTP/SMS, LDAP hoặc chữ ký số nội bộ.</div></div></div></div>`}
function publicRegisterScreen(){app().innerHTML=`<div class="min-h-screen bg-slate-100 p-6"><div class="max-w-4xl mx-auto"><button onclick="render()" class="mb-4 text-blue-700 font-bold">← Quay lại đăng nhập</button><div class="bg-white rounded-3xl shadow-xl p-8"><h1 class="text-3xl font-extrabold mb-2">Đăng ký tài khoản học viên online</h1><p class="text-slate-500 mb-6">Học viên tự nhập thông tin, chọn khóa học và tạo tài khoản. Sau khi tạo xong, hệ thống tự đăng nhập vào cổng học viên để nộp/theo dõi hồ sơ.</p><div class="grid md:grid-cols-2 gap-4"><input id="pubName" class="border rounded-xl p-3" placeholder="Họ và tên"><input id="pubPhone" class="border rounded-xl p-3" placeholder="Số điện thoại"><input id="pubEmail" class="border rounded-xl p-3" placeholder="Email"><input id="pubCitizen" class="border rounded-xl p-3" placeholder="Số CCCD"><select id="pubGender" class="border rounded-xl p-3"><option value="">Chọn giới tính</option><option>Nam</option><option>Nữ</option><option>Khác</option></select><input id="pubAddress" class="border rounded-xl p-3" placeholder="Địa chỉ liên hệ"><select id="pubCourse" class="md:col-span-2 border rounded-xl p-3">${COURSES.map(c=>`<option value="${c.id}">${c.name} - ${money(c.fee)}</option>`).join('')}</select><input id="pubPassword" type="password" class="border rounded-xl p-3" placeholder="Mật khẩu đăng nhập"><input id="pubPassword2" type="password" class="border rounded-xl p-3" placeholder="Nhập lại mật khẩu"></div><div class="mt-5 bg-blue-50 border border-blue-100 rounded-2xl p-4 text-sm text-blue-800"><b>Hồ sơ cần chuẩn bị:</b> Bằng tốt nghiệp, CCCD 2 mặt, giấy khám sức khỏe, sơ yếu lý lịch, ảnh cá nhân, đơn đề nghị thực hành theo Nghị định 96.</div><button onclick="createOnlineStudentAccount()" class="mt-6 bg-blue-600 text-white rounded-xl px-6 py-3 font-extrabold">Tạo tài khoản và gửi đăng ký</button></div></div></div>`}
function createOnlineStudentAccount(){let name=val('pubName'),phone=val('pubPhone'),email=val('pubEmail'),citizen=val('pubCitizen'),gender=val('pubGender'),address=val('pubAddress'),password=val('pubPassword'),password2=val('pubPassword2');if(!name||!phone||!email||!citizen||!gender||!address||!password)return alert('Vui lòng nhập đủ thông tin bắt buộc');if(password!==password2)return alert('Mật khẩu nhập lại chưa khớp');let id='HV26'+String(state.students.length+1).padStart(4,'0');let selectedCourse=val('pubCourse');let student={id,name,phone,email,citizen,gender,address,courseId:selectedCourse,status:isCmeCourse(selectedCourse)?'Đăng ký đào tạo liên tục YHCT - chờ nộp hồ sơ':'Học viên tự đăng ký online',docs:0,signed:false,paid:false,departmentId:'',instructorId:'',attendance:0,recordsSubmitted:0,score:'',comment:false,submitted:false,certificate:false};state.students.push(student);let accountId='u'+Date.now();state.accounts.push({id:accountId,name,role:'student',status:'Hoạt động',link:id,email,username:phone,password});log('Học viên tự đăng ký online',id+' - '+name);save();state.logged=true;state.user=accountId;state.role='student';state.page='dashboard';render()}
function layout(content){let menu={admin:[['dashboard','Tổng quan'],['register','Bổ sung / Xóa học viên'],['approve','Duyệt hồ sơ'],['contract','Hợp đồng'],['classAssign','Phân lớp học viên'],['graduatePractice','HV thực hành tốt nghiệp'],['schedule','Xếp lịch'],['cmeSchedule','Lịch học ĐTLT YHCT'],['practice','Công & bệnh án'],['gradebook','Bảng điểm'],['graduation','Tốt nghiệp'],['tuition','Quy định học phí'],['org','Khoa phòng & NHD'],['accounts','Tài khoản'],['uat','Checklist nghiệm thu'],['dataModel','Mô hình dữ liệu/API'],['changePassword','Đổi mật khẩu'],['reports','Báo cáo'],['logs','Nhật ký']],finance:[['dashboard','Tổng quan tài chính'],['payments','Đối soát học phí'],['financeReports','Báo cáo học phí'],['changePassword','Đổi mật khẩu']],director:[['dashboard','Tổng quan giám đốc'],['directorSignPage','Ký xác nhận'],['directorReports','Báo cáo điều hành'],['changePassword','Đổi mật khẩu']],student:[['dashboard','Hồ sơ của tôi'],['gradebook','Bảng điểm của tôi'],['changePassword','Đổi mật khẩu']],instructor:[['dashboard','Học viên phụ trách'],['caseReview','Chấm bệnh án'],['competency','Lượng giá qua môn'],['gradebook','Bảng điểm'],['changePassword','Đổi mật khẩu']],nurseChief:[['dashboard','Chấm công tại khoa'],['changePassword','Đổi mật khẩu']]}; let u=state.accounts.find(a=>a.id===state.user);app().innerHTML=`<div class="min-h-screen flex"><aside class="w-72 bg-slate-950 text-white p-5 hidden lg:block"><div class="flex items-center gap-3 mb-5"><span class="w-8 h-8 rounded-full bg-white p-0.5 overflow-hidden flex items-center justify-center shrink-0 border border-slate-200"><img src="${HOSPITAL_LOGO}" class="w-full h-full rounded-full object-contain bg-white" alt="Logo bệnh viện" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=&quot;text-[9px] font-black text-red-600&quot;>LOGO</span>'"></span><div><h2 class="text-xl font-extrabold leading-tight">BVĐK YHCT Hà Nội</h2><p class="text-sm text-slate-400">${u.name}<br>${roleName(u.role)}</p></div></div>${menu[state.role].map(m=>`<button onclick="go('${m[0]}')" class="w-full text-left px-4 py-3 rounded-2xl mb-2 ${state.page===m[0]?'bg-white text-slate-950 font-bold':'hover:bg-slate-800'}">${m[1]}</button>`).join('')}<button onclick="resetDemo()" class="w-full mt-4 bg-slate-800 rounded-xl p-2">Khôi phục mẫu</button><button onclick="logout()" class="w-full mt-2 border border-slate-700 rounded-xl p-2">Đăng xuất</button></aside><main class="flex-1"><div class="bg-white border-b p-5 flex flex-wrap items-center justify-between gap-3"><div class="flex items-center gap-3"><span class="w-8 h-8 rounded-full bg-white p-0.5 overflow-hidden flex items-center justify-center shrink-0 border border-slate-200"><img src="${HOSPITAL_LOGO}" class="w-full h-full rounded-full object-contain bg-white" alt="Logo bệnh viện" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=&quot;text-[9px] font-black text-red-600&quot;>LOGO</span>'"></span><div><b>Hệ thống quản lý học viên Bệnh viện Đa khoa Y học cổ truyền Hà Nội · Bản chính thức</b><div class="text-sm text-slate-500">Đang đăng nhập: ${u.name} · ${roleName(u.role)}</div></div></div><button onclick="logout()" class="bg-red-600 text-white rounded-xl px-4 py-2 font-bold">Đăng xuất</button></div><div class="p-6">${content}</div></main></div>`}
function title(t,s=''){return `<div class="mb-6"><h1 class="text-3xl font-extrabold">${t}</h1><p class="text-slate-500">${s}</p></div>`}
function table(list){return `<div class="bg-white rounded-3xl p-5 overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b"><th class="py-3">Mã</th><th>Học viên</th><th>Khóa</th><th>Khoa</th><th>NHD</th><th>Tiến độ</th><th>Trạng thái</th></tr></thead><tbody>${list.map(s=>`<tr class="border-b"><td class="py-3 font-bold">${s.id}</td><td>${s.name}<div class="text-slate-500">${s.phone}</div></td><td>${course(s.courseId).name}</td><td>${dep(s.departmentId).name}</td><td>${ins(s.instructorId).name}</td><td>${s.attendance}/${course(s.courseId).attendance} công · ${s.recordsSubmitted}/${course(s.courseId).records} BA</td><td>${badge(s.status)}</td></tr>`).join('')}</tbody></table></div>`}
function adminDashboard(){let majorRows=COURSES.map(c=>{let list=state.students.filter(s=>s.courseId===c.id),paid=list.filter(s=>s.paid).length,doing=list.filter(s=>s.status==='Đang thực hành').length,done=list.filter(s=>s.certificate).length;return `<tr class="border-b"><td class="py-3 font-bold">${c.major}</td><td>${c.name}</td><td>${list.length}</td><td>${paid}</td><td>${doing}</td><td>${done}</td><td>${money(list.reduce((sum,s)=>sum+c.fee,0))}</td></tr>`}).join('');let depRows=state.departments.map(d=>{let list=state.students.filter(s=>s.departmentId===d.id);return `<tr class="border-b"><td class="py-3 font-bold">${d.name}</td><td>${list.length}/${d.quota}</td><td>${state.instructors.filter(i=>i.departmentId===d.id).length}</td><td>${list.filter(s=>s.status==='Đang thực hành').length}</td></tr>`}).join('');return title('Tổng quan','Dashboard theo chuyên ngành, khoa/phòng và toàn bộ học viên')+`<div class="grid md:grid-cols-4 gap-4 mb-6"><div class="bg-blue-600 text-white rounded-3xl p-5"><p>Tổng học viên</p><b class="text-3xl">${state.students.length}</b></div><div class="bg-emerald-600 text-white rounded-3xl p-5"><p>Khoa/phòng</p><b class="text-3xl">${state.departments.length}</b></div><div class="bg-purple-600 text-white rounded-3xl p-5"><p>Người hướng dẫn</p><b class="text-3xl">${state.instructors.length}</b></div><div class="bg-orange-600 text-white rounded-3xl p-5"><p>Chờ ký</p><b class="text-3xl">${state.students.filter(s=>s.submitted&&!s.certificate).length}</b></div></div><div class="grid xl:grid-cols-2 gap-4 mb-6"><div class="bg-white rounded-3xl p-5 overflow-x-auto"><h2 class="text-xl font-extrabold mb-3">Dashboard theo chuyên ngành</h2><table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b"><th class="py-3">Chuyên ngành</th><th>Khóa</th><th>HV</th><th>Đã thu</th><th>Đang TH</th><th>HT</th><th>Dự thu</th></tr></thead><tbody>${majorRows}</tbody></table></div><div class="bg-white rounded-3xl p-5 overflow-x-auto"><h2 class="text-xl font-extrabold mb-3">Dashboard theo khoa/phòng</h2><table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b"><th class="py-3">Khoa/phòng</th><th>Sử dụng chỉ tiêu</th><th>NHD</th><th>Đang TH</th></tr></thead><tbody>${depRows}</tbody></table></div></div>`+table(state.students)}
function register(){return title('Bổ sung / Xóa học viên','Admin bổ sung học viên nội bộ, tạo tài khoản đăng nhập và xóa hồ sơ khi chưa khóa/chưa ký xác nhận')+`<div class="bg-white rounded-3xl p-6 mb-5"><h2 class="text-xl font-extrabold mb-3">Bổ sung học viên</h2><div class="grid md:grid-cols-4 gap-3"><input id="name" class="border rounded-xl p-3" placeholder="Họ tên"><input id="phone" class="border rounded-xl p-3" placeholder="Điện thoại"><input id="email" class="border rounded-xl p-3" placeholder="Email"><select id="course" class="border rounded-xl p-3">${COURSES.map(c=>`<option value="${c.id}">${c.name} - ${money(c.fee)}</option>`).join('')}</select></div><button onclick="addStudent()" class="mt-4 bg-blue-600 text-white rounded-xl px-5 py-3 font-bold">Bổ sung học viên và tạo tài khoản</button><div class="mt-3 bg-blue-50 border border-blue-100 rounded-2xl p-3 text-sm text-blue-800">Tài khoản đăng nhập của học viên là số điện thoại, mật khẩu mặc định 123456.</div></div><div class="bg-white rounded-3xl p-5 overflow-x-auto"><h2 class="text-xl font-extrabold mb-3">Danh sách học viên</h2><table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b"><th class="py-3">Mã</th><th>Học viên</th><th>Khóa</th><th>Trạng thái</th><th>Thao tác</th></tr></thead><tbody>${state.students.map(s=>`<tr class="border-b"><td class="py-3 font-bold">${s.id}</td><td>${s.name}<div class="text-slate-500">${s.phone||''} · ${s.email||''}</div></td><td>${course(s.courseId).name}</td><td>${badge(s.status)}</td><td><button onclick="deleteStudent('${s.id}')" class="bg-red-600 text-white rounded-xl px-3 py-2 font-bold">Xóa</button></td></tr>`).join('')}</tbody></table></div>`}
function addStudent(){let name=val('name'),phone=val('phone'),email=val('email'); if(!name||!phone)return alert('Nhập họ tên và điện thoại'); if(state.accounts.some(a=>accountKeys(a).includes(normLogin(phone))))return alert('Số điện thoại này đã có tài khoản đăng nhập'); let id='HV26'+String(state.students.length+1).padStart(4,'0');state.students.push({id,name,phone,email,courseId:val('course'),status:'Admin bổ sung hồ sơ',docs:0,signed:false,paid:false,departmentId:'',instructorId:'',attendance:0,recordsSubmitted:0,score:'',comment:false,submitted:false,certificate:false});state.accounts.push({id:'u'+Date.now(),name,role:'student',status:'Hoạt động',link:id,username:phone,phone,email,password:'123456'});log('Admin bổ sung học viên và tạo tài khoản đăng nhập',id+' - '+name+' - tài khoản '+phone);save();go('register')}
function deleteStudent(id){let s=state.students.find(x=>x.id===id);if(!s)return alert('Không tìm thấy học viên');if(s.certificate||s.status==='Hoàn thành'||s.locked)return alert('Không thể xóa hồ sơ đã khóa hoặc đã được giám đốc ký xác nhận');if(!confirm('Xóa học viên '+s.name+'? Hệ thống sẽ xóa kèm tài khoản đăng nhập và dữ liệu liên quan trong bản demo.'))return;state.students=state.students.filter(x=>x.id!==id);state.accounts=state.accounts.filter(a=>a.link!==id);log('Admin xóa học viên',id+' - '+s.name);save();go('register')}
function approve(){return title('Duyệt hồ sơ','Admin xem từng giấy tờ học viên đã nộp, đánh dấu hợp lệ/không hợp lệ rồi mới duyệt ký hợp đồng')+cards(state.students,s=>{s.documents=s.documents||{};s.docReview=s.docReview||{};let submitted=REQUIRED_DOCS.filter(d=>s.documents[d.key]).length;let valid=REQUIRED_DOCS.filter(d=>s.docReview[d.key]==='Hợp lệ').length;let missing=REQUIRED_DOCS.filter(d=>!s.documents[d.key]).length;return `<div class="flex justify-between gap-3 mb-2"><div><b class="text-lg">${s.name}</b><div class="text-sm text-slate-500">${s.id} · ${s.phone}</div></div>${badge(s.status)}</div><div class="bg-slate-50 rounded-2xl p-3 mb-3 text-sm"><b>${course(s.courseId).name}</b><div>Học phí: <b>${money(course(s.courseId).fee)}</b> · Hồ sơ đã nộp: <b>${submitted}/${REQUIRED_DOCS.length}</b> · Hợp lệ: <b>${valid}/${REQUIRED_DOCS.length}</b></div></div><div class="space-y-2">${REQUIRED_DOCS.map(d=>{let has=s.documents[d.key];let rv=s.docReview[d.key]||'';return `<div class="border rounded-2xl p-3"><div class="flex flex-wrap items-center justify-between gap-2"><div><b>${d.name}</b><div class="text-sm ${has?'text-green-600':'text-amber-600'}">${has?'Học viên đã nộp file demo':'Chưa nộp'}</div><div class="text-xs text-slate-500">Trạng thái duyệt: ${rv||'Chưa kiểm tra'}</div></div><div class="flex gap-2"><button ${!has?'disabled':''} onclick="reviewDoc('${s.id}','${d.key}','Hợp lệ')" class="${has?'bg-green-600':'bg-slate-300'} text-white rounded-xl px-3 py-2 text-sm">Hợp lệ</button><button ${!has?'disabled':''} onclick="reviewDoc('${s.id}','${d.key}','Không hợp lệ')" class="${has?'bg-red-600':'bg-slate-300'} text-white rounded-xl px-3 py-2 text-sm">Không hợp lệ</button></div></div></div>`}).join('')}</div><div class="mt-4 bg-blue-50 border border-blue-100 rounded-2xl p-3 text-sm text-blue-800">Chỉ nên duyệt ký hợp đồng khi đủ ${REQUIRED_DOCS.length}/${REQUIRED_DOCS.length} hồ sơ và tất cả đều hợp lệ. Nếu thiếu/sai, bấm yêu cầu bổ sung để học viên nộp lại trong tài khoản học viên.</div><button onclick="setStatus('${s.id}','Yêu cầu bổ sung')" class="mt-3 bg-amber-500 text-white rounded-xl px-3 py-2">Yêu cầu bổ sung</button> <button onclick="approveForContract('${s.id}')" class="mt-3 bg-green-600 text-white rounded-xl px-3 py-2">Duyệt hồ sơ để ký hợp đồng</button>`})}
function reviewDoc(id,key,result){let s=state.students.find(x=>x.id===id);s.docReview=s.docReview||{};s.docReview[key]=result;log('Duyệt giấy tờ hồ sơ',s.name+' - '+(REQUIRED_DOCS.find(d=>d.key===key)||{}).name+' → '+result);save();render()}
function approveForContract(id){let s=state.students.find(x=>x.id===id);s.documents=s.documents||{};s.docReview=s.docReview||{};let submitted=REQUIRED_DOCS.filter(d=>s.documents[d.key]).length;let valid=REQUIRED_DOCS.filter(d=>s.docReview[d.key]==='Hợp lệ').length;if(submitted<REQUIRED_DOCS.length)return alert('Chưa đủ hồ sơ, cần yêu cầu học viên bổ sung trước khi duyệt ký hợp đồng');if(valid<REQUIRED_DOCS.length)return alert('Còn giấy tờ chưa được đánh dấu hợp lệ');s.status='Hồ sơ đã duyệt - chờ ký hợp đồng';s.paymentCode=paymentCode(s);log('Duyệt hồ sơ đủ điều kiện ký hợp đồng và sinh mã QR học phí',s.name+' - '+s.paymentCode);save();render()}
function setStatus(id,st){let s=state.students.find(x=>x.id===id);s.status=st;log('Cập nhật hồ sơ',s.name+' → '+st);save();render()}
function contract(){let saved=localStorage.getItem('bv_contract_template_v1')||'CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM\nĐộc lập - Tự do - Hạnh phúc\n\nHỢP ĐỒNG THỰC HÀNH KHÁM BỆNH, CHỮA BỆNH\n\nCăn cứ hồ sơ đăng ký thực hành của học viên và quy định tiếp nhận người thực hành của bệnh viện.\n\nBên A: Bệnh viện ................................................\nĐại diện: ................................................ Chức vụ: ................................................\n\nBên B: {{ho_ten}}\nMã học viên: {{ma_hoc_vien}}\nCCCD: {{cccd}}\nĐiện thoại: {{dien_thoai}}\nEmail: {{email}}\n\nĐiều 1. Nội dung thực hành\nBên B đăng ký thực hành chuyên ngành {{chuyen_nganh}}, khóa {{khoa_hoc}}, thời gian {{thoi_gian}}.\n\nĐiều 2. Học phí và nghĩa vụ tài chính\nHọc phí thực hành: {{hoc_phi}}. Học viên nộp học phí theo hướng dẫn của bệnh viện sau khi hồ sơ được duyệt và hợp đồng được ký.\n\nĐiều 3. Yêu cầu hoàn thành\nHọc viên phải hoàn thành tối thiểu {{ngay_cong}} ngày công thực hành và {{benh_an}} bệnh án/hồ sơ chuyên môn theo quy định.\n\nĐiều 4. Trách nhiệm của học viên\nTuân thủ nội quy bệnh viện, quy chế chuyên môn, phân công của khoa/phòng và người hướng dẫn.\n\nĐiều 5. Trách nhiệm của bệnh viện\nBố trí khoa/phòng, người hướng dẫn và xác nhận kết quả thực hành khi học viên đủ điều kiện.\n\nHai bên cam kết thực hiện đúng nội dung hợp đồng và quy định pháp luật hiện hành.';return title('Hợp đồng','Lưu mẫu hợp đồng bệnh viện, tự điền theo hồ sơ học viên, tạo bản nháp để admin duyệt trước khi ký')+`<div class="bg-white rounded-3xl p-5 mb-5"><h2 class="text-xl font-extrabold mb-3">Mẫu hợp đồng chuẩn của bệnh viện</h2><textarea id="contractTemplate" class="border rounded-2xl p-3 w-full h-72">${saved}</textarea><div class="flex flex-wrap gap-2 mt-3"><button onclick="saveContractTemplate()" class="bg-slate-900 text-white rounded-xl px-4 py-2 font-bold">Lưu mẫu hợp đồng</button><button onclick="resetContractTemplate()" class="border rounded-xl px-4 py-2 font-bold">Xóa mẫu đã lưu</button></div><p class="text-sm text-slate-500 mt-2">Có thể dùng các biến: {{ho_ten}}, {{ma_hoc_vien}}, {{cccd}}, {{dien_thoai}}, {{email}}, {{chuyen_nganh}}, {{khoa_hoc}}, {{thoi_gian}}, {{hoc_phi}}, {{ngay_cong}}, {{benh_an}}.</p></div>`+cards(state.students,s=>{let c=course(s.courseId);return `<b>${s.name}</b><div class="text-sm text-slate-500">${s.id} · ${s.phone||''} · ${s.email||'chưa có email'} · CCCD: ${s.citizen||'chưa cập nhật'}</div><div class="bg-slate-50 rounded-2xl p-3 my-3 text-sm"><b>${c.name}</b><br>Thời gian: ${c.duration} · Học phí: <b>${money(c.fee)}</b><br>Yêu cầu: ${c.attendance} công · ${c.records} bệnh án</div><p>Trạng thái hợp đồng: <b>${s.contractStatus||'Chưa tạo hợp đồng'}</b></p><p class="text-sm text-slate-500">Ký hợp đồng: <b>${s.signed?'Đã ký':'Chưa ký'}</b> · Học phí: <b>${s.paid?'Đã đóng':'Chưa đóng'}</b></p><div class="flex flex-wrap gap-2 mt-3"><button onclick="generateContract('${s.id}')" class="bg-blue-600 text-white rounded-xl px-3 py-2">AI tạo bản nháp</button><button onclick="previewContract('${s.id}')" class="bg-cyan-600 text-white rounded-xl px-3 py-2">Xem/In hợp đồng</button><button onclick="approveContract('${s.id}')" class="bg-green-600 text-white rounded-xl px-3 py-2">Duyệt nội dung</button><button onclick="sign('${s.id}')" class="bg-indigo-600 text-white rounded-xl px-3 py-2">Xác nhận đã ký</button></div>`})}
function fillContract(s,tpl){let c=course(s.courseId);return tpl.replaceAll('{{ho_ten}}',s.name).replaceAll('{{ma_hoc_vien}}',s.id).replaceAll('{{cccd}}',s.citizen||'................................').replaceAll('{{dien_thoai}}',s.phone||'').replaceAll('{{email}}',s.email||'').replaceAll('{{chuyen_nganh}}',c.major).replaceAll('{{khoa_hoc}}',c.name).replaceAll('{{thoi_gian}}',c.duration).replaceAll('{{hoc_phi}}',money(c.fee)).replaceAll('{{ngay_cong}}',c.attendance).replaceAll('{{benh_an}}',c.records)}
function saveContractTemplate(){localStorage.setItem('bv_contract_template_v1',val('contractTemplate'));alert('Đã lưu mẫu hợp đồng bệnh viện')}
function resetContractTemplate(){if(confirm('Xóa mẫu hợp đồng đã lưu và quay về mẫu gợi ý?')){localStorage.removeItem('bv_contract_template_v1');render()}}
function generateContract(id){let s=state.students.find(x=>x.id===id),tpl=val('contractTemplate')||localStorage.getItem('bv_contract_template_v1')||'';s.contractDraft=fillContract(s,tpl);s.contractStatus='AI đã tạo bản nháp - chờ admin duyệt';log('AI tạo bản nháp hợp đồng',s.name);save();render()}
function previewContract(id){let s=state.students.find(x=>x.id===id);if(!s.contractDraft)return alert('Chưa có bản nháp hợp đồng. Bấm AI tạo bản nháp trước.');let w=window.open('','_blank');w.document.write('<div style="font-family:Times New Roman;font-size:18px;white-space:pre-wrap;padding:40px;line-height:1.5">'+s.contractDraft.replaceAll('<','&lt;').replaceAll('>','&gt;')+'</div><button onclick="window.print()" style="margin:20px 40px;padding:12px 20px">In / lưu PDF</button>')}
function approveContract(id){let s=state.students.find(x=>x.id===id);if(!s.contractDraft)return alert('Chưa có bản nháp hợp đồng để duyệt');s.contractStatus='Admin đã duyệt nội dung - chờ ký';log('Duyệt nội dung hợp đồng',s.name);save();render()}
function sign(id){let s=state.students.find(x=>x.id===id);if(s.contractStatus!=='Admin đã duyệt nội dung - chờ ký')return alert('Cần tạo bản nháp và duyệt nội dung hợp đồng trước khi xác nhận đã ký');if(!s.paid)return alert('Chưa thể ký hợp đồng chính thức. Học viên đã duyệt hồ sơ nhưng tài chính chưa xác nhận học phí. Trạng thái giữ ở bước chờ nộp học phí/chờ tài chính xác nhận.');s.signed=true;s.contractStatus='Đã ký hợp đồng';s.status='Đã ký hợp đồng';log('Ký hợp đồng',s.name);save();render()}
function cmeSchedulePage(){let schedules=getCmeSchedules();let cme=COURSES.filter(c=>c.type==='cme_yhct');return title('Lịch học đào tạo liên tục Y học cổ truyền','Admin chủ động tạo, sửa, thay đổi lịch học; học viên xem lịch mới nhất và link học trực tuyến')+`<div class="bg-white rounded-3xl p-6 mb-5"><h2 class="text-xl font-extrabold mb-3">Thêm / cập nhật lịch học</h2><div class="grid md:grid-cols-3 gap-3"><select id="cmeCourse" class="border rounded-xl p-3">${cme.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select><input id="cmeDate" type="date" class="border rounded-xl p-3"><input id="cmeTime" type="time" class="border rounded-xl p-3"><input id="cmeTitle" class="border rounded-xl p-3 md:col-span-2" placeholder="Nội dung buổi học"><input id="cmeLocation" class="border rounded-xl p-3" placeholder="Phòng học / địa điểm"><input id="cmeOnlineLink" class="border rounded-xl p-3 md:col-span-2" placeholder="Link học trực tuyến"><input id="cmeNotice" class="border rounded-xl p-3" placeholder="Thông báo thay đổi lịch học"></div><button onclick="addCmeSchedule()" class="mt-4 bg-blue-600 text-white rounded-xl px-5 py-3 font-bold">Lưu lịch học</button></div><div class="grid xl:grid-cols-2 gap-4">${schedules.map(x=>`<div class="bg-white rounded-3xl p-5"><div class="flex justify-between gap-3"><div><b>${course(x.courseId).name}</b><div class="text-sm text-slate-500">${x.date} · ${x.time}</div></div>${badge('Có thể thay đổi')}</div><p class="mt-3"><b>Nội dung:</b> ${x.title}</p><p><b>Địa điểm:</b> ${x.location||'Chưa cập nhật'}</p><p><b>Link học trực tuyến:</b> ${x.onlineLink?`<a class="text-blue-700 font-bold" target="_blank" href="${x.onlineLink}">${x.onlineLink}</a>`:'Chưa có'}</p><p><b>Thông báo:</b> ${x.notice||'Không có'}</p><button onclick="deleteCmeSchedule('${x.id}')" class="mt-3 bg-red-600 text-white rounded-xl px-3 py-2">Xóa lịch</button></div>`).join('')||'<div class="text-slate-500">Chưa có lịch học đào tạo liên tục.</div>'}</div>`}
function addCmeSchedule(){let item={id:'cmeSch'+Date.now(),courseId:val('cmeCourse'),date:val('cmeDate'),time:val('cmeTime'),title:val('cmeTitle'),location:val('cmeLocation'),onlineLink:val('cmeOnlineLink'),notice:val('cmeNotice'),updatedAt:new Date().toLocaleString('vi-VN')};if(!item.courseId||!item.date||!item.time||!item.title)return alert('Vui lòng nhập chương trình, ngày, giờ và nội dung học');let list=getCmeSchedules();list.unshift(item);saveCmeSchedules(list);state.cmeSchedules=list;log('Cập nhật lịch học đào tạo liên tục YHCT',course(item.courseId).name+' - '+item.date+' '+item.time);save();render()}
function deleteCmeSchedule(id){if(!confirm('Xóa lịch học này?'))return;let list=getCmeSchedules().filter(x=>x.id!==id);saveCmeSchedules(list);state.cmeSchedules=list;log('Xóa lịch học đào tạo liên tục YHCT',id);save();render()}
function studentCmeSchedule(s){if(!isCmeCourse(s.courseId))return '';let list=getCmeSchedules().filter(x=>x.courseId===s.courseId);return `<div class="bg-white rounded-3xl p-5 mb-5 border-2 border-emerald-100"><h2 class="text-xl font-extrabold mb-3">Lịch học đào tạo liên tục YHCT</h2>${list.map(x=>`<div class="border rounded-2xl p-4 mb-3"><b>${x.title}</b><div class="text-sm text-slate-500">${x.date} · ${x.time}</div><p><b>Địa điểm:</b> ${x.location||'Chưa cập nhật'}</p><p><b>Link học trực tuyến:</b> ${x.onlineLink?`<a class="text-blue-700 font-bold" target="_blank" href="${x.onlineLink}">Vào lớp học</a>`:'Chưa có'}</p><p><b>Thông báo:</b> ${x.notice||'Không có'}</p></div>`).join('')||'<p class="text-slate-500">Chưa có lịch học. Vui lòng theo dõi thông báo từ bệnh viện.</p>'}</div>`}
function classAssignPage(){return title('Phân lớp học viên','Admin tạo lớp theo dạng lớp, tự đặt tên lớp, phân học viên vào lớp; sau khi phân lớp tài khoản học viên sẽ thấy lớp, lịch học, khoa/phòng và người hướng dẫn')+`<div class="grid xl:grid-cols-2 gap-4 mb-5"><div class="bg-white rounded-3xl p-6"><h2 class="text-xl font-extrabold mb-3">Tạo lớp mới</h2><div class="grid md:grid-cols-2 gap-3"><select id="newClassType" class="border rounded-xl p-3"><option>Lớp chứng chỉ hành nghề</option><option>Lớp đào tạo liên tục</option><option>Lớp thực hành chuyên môn</option><option>Lớp bồi dưỡng ngắn hạn</option></select><input id="newClassName" class="border rounded-xl p-3" placeholder="Tên lớp do admin tự đặt"><select id="newClassCourse" class="border rounded-xl p-3 md:col-span-2">${COURSES.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select><input id="newClassNote" class="border rounded-xl p-3 md:col-span-2" placeholder="Ghi chú lớp / khóa / đợt học"></div><button onclick="addClass()" class="mt-4 bg-blue-600 text-white rounded-xl px-5 py-3 font-bold">Thêm lớp</button></div><div class="bg-white rounded-3xl p-6"><h2 class="text-xl font-extrabold mb-3">Danh sách lớp</h2>${(state.classes||[]).map(c=>`<div class="border-b py-3"><b>${c.name}</b><div class="text-sm text-slate-500">${c.type} · ${course(c.courseId).name}</div><div class="text-sm">Sĩ số: <b>${state.students.filter(s=>s.classId===c.id).length}</b> học viên</div></div>`).join('')||'<div class="text-slate-500">Chưa có lớp.</div>'}</div></div><div class="bg-white rounded-3xl p-5 overflow-x-auto"><h2 class="text-xl font-extrabold mb-3">Phân lớp, lịch học, khoa/phòng và người hướng dẫn</h2><table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b"><th class="py-3">Học viên</th><th>Khóa đăng ký</th><th>Lớp</th><th>Khoa/phòng</th><th>Người hướng dẫn</th><th>Lịch học</th><th></th></tr></thead><tbody>${state.students.map(s=>`<tr class="border-b align-top"><td class="py-3"><b>${s.name}</b><div class="text-slate-500">${s.id} · ${s.phone||''}</div></td><td>${course(s.courseId).name}</td><td><select id="class-${s.id}" class="border rounded-xl p-2 min-w-48">${(state.classes||[]).map(c=>`<option value="${c.id}" ${s.classId===c.id?'selected':''}>${c.name}</option>`).join('')}</select></td><td><select id="classDep-${s.id}" onchange="refreshClassInstructorSelect('${s.id}')" class="border rounded-xl p-2 min-w-40">${state.departments.map(d=>`<option value="${d.id}" ${(s.classDepartmentId||s.departmentId)===d.id?'selected':''}>${d.name}</option>`).join('')}</select></td><td><select id="classIns-${s.id}" class="border rounded-xl p-2 min-w-48">${state.instructors.map(i=>`<option value="${i.id}" ${(s.classInstructorId||s.instructorId)===i.id?'selected':''}>${i.name} - ${dep(i.departmentId).name}</option>`).join('')}</select></td><td><input id="classSchedule-${s.id}" value="${s.classSchedule||''}" class="border rounded-xl p-2 min-w-56" placeholder="VD: T2-T6, 7h30-16h30"><input id="classOnline-${s.id}" value="${s.classOnlineLink||''}" class="border rounded-xl p-2 min-w-56 mt-2" placeholder="Link học online nếu có"></td><td><button onclick="assignClass('${s.id}')" class="bg-purple-600 text-white rounded-xl px-3 py-2 font-bold">Lưu phân lớp</button></td></tr>`).join('')}</tbody></table></div>`}
function addClass(){let name=val('newClassName'),type=val('newClassType'),courseId=val('newClassCourse'),note=val('newClassNote');if(!name)return alert('Nhập tên lớp');state.classes=state.classes||[];state.classes.unshift({id:'cl'+Date.now(),type,name,courseId,note});log('Tạo lớp học viên',type+' - '+name);save();render()}
function refreshClassInstructorSelect(id){let did=val('classDep-'+id),el=document.getElementById('classIns-'+id);if(!el)return;let list=state.instructors.filter(i=>i.departmentId===did);el.innerHTML=(list.length?list:state.instructors).map(i=>`<option value="${i.id}">${i.name} - ${dep(i.departmentId).name}</option>`).join('')}
function assignClass(id){let s=state.students.find(x=>x.id===id);if(!s)return;let classId=val('class-'+id);if(!classId)return alert('Chưa có lớp để phân. Vui lòng tạo lớp trước.');s.classId=classId;s.classDepartmentId=val('classDep-'+id);s.classInstructorId=val('classIns-'+id);s.classSchedule=val('classSchedule-'+id);s.classOnlineLink=val('classOnline-'+id);s.departmentId=s.classDepartmentId||s.departmentId;s.instructorId=s.classInstructorId||s.instructorId;if(!s.status||s.status.includes('đăng ký'))s.status='Đã phân lớp';log('Phân lớp học viên',s.name+' → '+cls(classId).name+' / '+dep(s.classDepartmentId).name+' / '+ins(s.classInstructorId).name);save();render()}
function graduatePracticePage(){let list=state.graduatePracticeList||[];return title('Học viên thực hành tốt nghiệp','Quản lý các đoàn học viên thực hành tốt nghiệp do các trường gửi đến: trường, số lượng, thời gian học; admin được thêm, xóa và in danh sách')+`<div class="bg-white rounded-3xl p-6 mb-5"><h2 class="text-xl font-extrabold mb-3">Thêm đoàn thực hành tốt nghiệp</h2><div class="grid md:grid-cols-4 gap-3"><input id="gpSchool" class="border rounded-xl p-3" placeholder="Tên trường gửi học viên"><input id="gpCount" type="number" class="border rounded-xl p-3" placeholder="Số lượng học viên"><input id="gpTime" class="border rounded-xl p-3" placeholder="Thời gian học, VD: 01/06 - 30/06/2026"><input id="gpFunding" type="number" class="border rounded-xl p-3" placeholder="Kinh phí dự kiến / đã thu"><input id="gpNote" class="border rounded-xl p-3" placeholder="Ghi chú / khoa phòng / lớp"></div><div class="flex flex-wrap gap-2 mt-4"><button onclick="addGraduatePractice()" class="bg-blue-600 text-white rounded-xl px-5 py-3 font-bold">Thêm vào danh sách</button><button onclick="printGraduatePractice()" class="bg-slate-900 text-white rounded-xl px-5 py-3 font-bold">In danh sách</button></div></div><div class="bg-white rounded-3xl p-5 overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b"><th class="py-3">Trường</th><th>Số lượng</th><th>Thời gian học</th><th>Kinh phí</th><th>Ghi chú</th><th>Ngày nhập</th><th>Thao tác</th></tr></thead><tbody>${list.map(x=>`<tr class="border-b"><td class="py-3 font-bold">${x.school}</td><td>${x.count}</td><td>${x.time}</td><td><b>${money(x.funding||0)}</b></td><td>${x.note||''}</td><td>${x.createdAt||''}</td><td><button onclick="removeGraduatePractice('${x.id}')" class="bg-red-600 text-white rounded-xl px-3 py-2 font-bold">Xóa</button></td></tr>`).join('')||'<tr><td colspan="7" class="py-4 text-slate-500">Chưa có danh sách thực hành tốt nghiệp.</td></tr>'}</tbody></table></div>`}
function addGraduatePractice(){let school=val('gpSchool'),count=+val('gpCount')||0,time=val('gpTime'),funding=+val('gpFunding')||0,note=val('gpNote');if(!school||!count||!time)return alert('Nhập đủ trường, số lượng học viên và thời gian học');state.graduatePracticeList=state.graduatePracticeList||[];state.graduatePracticeList.unshift({id:'gp'+Date.now(),school,count,time,funding,note,createdAt:new Date().toLocaleString('vi-VN')});log('Thêm học viên thực hành tốt nghiệp',school+' - '+count+' học viên - '+time+' - kinh phí '+money(funding));save();render()}
function removeGraduatePractice(id){if(!confirm('Xóa dòng này khỏi danh sách thực hành tốt nghiệp?'))return;state.graduatePracticeList=(state.graduatePracticeList||[]).filter(x=>x.id!==id);log('Xóa danh sách thực hành tốt nghiệp',id);save();render()}
function printGraduatePractice(){let list=state.graduatePracticeList||[];let rows=list.map((x,i)=>`<tr><td>${i+1}</td><td>${x.school}</td><td>${x.count}</td><td>${x.time}</td><td>${money(x.funding||0)}</td><td>${x.note||''}</td></tr>`).join('');let total=list.reduce((sum,x)=>sum+(+x.funding||0),0);let w=window.open('','_blank');w.document.write(`<div style="font-family:Arial;padding:40px;line-height:1.5"><h2 style="text-align:center">DANH SÁCH HỌC VIÊN THỰC HÀNH TỐT NGHIỆP</h2><table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%"><tr><th>STT</th><th>Trường</th><th>Số lượng học viên</th><th>Thời gian học</th><th>Kinh phí</th><th>Ghi chú</th></tr>${rows||'<tr><td colspan="6">Chưa có dữ liệu</td></tr>'}<tr><td colspan="4"><b>Tổng kinh phí</b></td><td colspan="2"><b>${money(total)}</b></td></tr></table><button onclick="window.print()" style="margin-top:20px;padding:10px 16px">In / lưu PDF</button></div>`)}
function schedule(){return title('Xếp lịch lâm sàng theo khoa/phòng','Chọn khoa/phòng, người hướng dẫn, thời gian thực hành và kiểm tra chỉ tiêu theo từng khoa')+`<div class="bg-white rounded-3xl p-5 mb-5 overflow-x-auto"><h2 class="text-xl font-extrabold mb-3">Chỉ tiêu khoa/phòng</h2><table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b"><th class="py-3">Khoa/phòng</th><th>Chỉ tiêu</th><th>Đang xếp</th><th>Còn trống</th><th>Người hướng dẫn</th></tr></thead><tbody>${state.departments.map(d=>{let used=state.students.filter(s=>s.departmentId===d.id&&s.status==='Đang thực hành').length;return `<tr class="border-b"><td class="py-3 font-bold">${d.name}</td><td>${d.quota}</td><td>${used}</td><td>${Math.max(d.quota-used,0)}</td><td>${state.instructors.filter(i=>i.departmentId===d.id).map(i=>i.name).join(', ')||'Chưa có'}</td></tr>`}).join('')}</tbody></table></div>`+cards(state.students,s=>`<b>${s.name}</b><div class="text-sm text-slate-500">${s.id} · ${course(s.courseId).name}</div><div class="grid md:grid-cols-2 gap-2 mt-3"><select id="dep-${s.id}" onchange="refreshInstructorSelect('${s.id}')" class="border rounded-xl p-2">${state.departments.map(d=>`<option value="${d.id}" ${s.departmentId===d.id?'selected':''}>${d.name} - chỉ tiêu ${d.quota}</option>`).join('')}</select><select id="ins-${s.id}" class="border rounded-xl p-2">${state.instructors.filter(i=>!s.departmentId||i.departmentId===(s.departmentId||state.departments[0].id)).map(i=>`<option value="${i.id}" ${s.instructorId===i.id?'selected':''}>${i.name} - ${dep(i.departmentId).name}</option>`).join('')||state.instructors.map(i=>`<option value="${i.id}" ${s.instructorId===i.id?'selected':''}>${i.name}</option>`).join('')}</select><input id="start-${s.id}" type="date" value="${s.startDate||''}" class="border rounded-xl p-2"><input id="end-${s.id}" type="date" value="${s.endDate||''}" class="border rounded-xl p-2"></div><div class="mt-2 text-sm ${(!s.paid||!s.signed)?'text-amber-700':'text-green-700'}">Điều kiện: học phí ${s.paid?'đã xác nhận':'chưa xác nhận'} · hợp đồng ${s.signed?'đã ký':'chưa ký'}</div><button onclick="assign('${s.id}')" class="mt-3 bg-purple-600 text-white rounded-xl px-3 py-2">Gán lịch theo khoa/phòng</button>`)}
function refreshInstructorSelect(id){let did=val('dep-'+id),el=document.getElementById('ins-'+id);if(!el)return;let list=state.instructors.filter(i=>i.departmentId===did);el.innerHTML=(list.length?list:state.instructors).map(i=>`<option value="${i.id}">${i.name} - ${dep(i.departmentId).name}</option>`).join('')}
function assign(id){let s=state.students.find(x=>x.id===id);if(!s.paid)return alert('Chưa thể xếp lịch thực hành. Học viên chưa được tài chính xác nhận đã đóng học phí.');if(!s.signed)return alert('Chưa thể xếp lịch thực hành. Cần ký hợp đồng chính thức sau khi đã xác nhận học phí.');let did=val('dep-'+id),iid=val('ins-'+id);let count=state.students.filter(x=>x.departmentId===did&&x.status==='Đang thực hành'&&x.id!==id).length;let d=state.departments.find(x=>x.id===did); if(count>=d.quota)return alert('Khoa/phòng này đã vượt chỉ tiêu tiếp nhận');s.departmentId=did;s.instructorId=iid;s.startDate=val('start-'+id);s.endDate=val('end-'+id);s.status='Đang thực hành';log('Xếp lịch theo khoa/phòng',s.name+' → '+dep(did).name+' / '+ins(iid).name+' / '+(s.startDate||'chưa chọn ngày')+' - '+(s.endDate||'chưa chọn ngày'));save();render()}
function practice(){return title('Điểm danh theo ngày & bệnh án','Chấm công theo từng ngày thực hành, theo khoa/phòng và người hướng dẫn')+cards(state.students,s=>{s.attendanceLog=s.attendanceLog||[];let today=new Date().toISOString().slice(0,10);return `<b>${s.name}</b><div class="text-sm text-slate-500">${s.id} · ${dep(s.departmentId).name} · ${ins(s.instructorId).name}</div><p class="mt-2">Tổng: <b>${s.attendance}/${course(s.courseId).attendance}</b> công · <b>${s.recordsSubmitted}/${course(s.courseId).records}</b> bệnh án</p><div class="grid md:grid-cols-3 gap-2 my-3"><input id="attDate-${s.id}" type="date" value="${today}" class="border rounded-xl p-2"><select id="attStatus-${s.id}" class="border rounded-xl p-2"><option value="Có mặt">Có mặt</option><option value="Vắng có phép">Vắng có phép</option><option value="Vắng không phép">Vắng không phép</option></select><input id="attNote-${s.id}" class="border rounded-xl p-2" placeholder="Ghi chú/kíp trực"></div><div class="flex flex-wrap gap-2"><button onclick="markAttendance('${s.id}')" class="bg-blue-600 text-white rounded-xl px-3 py-2">Lưu điểm danh ngày</button><button onclick="plus('${s.id}','recordsSubmitted')" class="bg-green-600 text-white rounded-xl px-3 py-2">+1 bệnh án</button><button onclick="checkExam('${s.id}')" class="bg-cyan-600 text-white rounded-xl px-3 py-2">Kiểm tra thi</button></div><div class="mt-4 bg-slate-50 rounded-2xl p-3 text-sm"><b>Lịch sử điểm danh gần nhất</b>${s.attendanceLog.slice(0,5).map(l=>`<div class="border-b py-2">${l.date} · <b>${l.status}</b> · ${l.department} · ${l.note||''}</div>`).join('')||'<div class="text-slate-500 mt-2">Chưa có điểm danh.</div>'}</div>`})}

          `).join('')||`<div class="text-slate-500 mt-2">Chưa có điểm danh.</div>`}

      `;

}

function markAttendanceNurseChief(id){
  let acc=state.accounts.find(x=>x.id===state.user)||{};
  let depId=acc.link;
  let s=state.students.find(x=>x.id===id);
  if(!s)return alert('Không tìm thấy học viên');
  if(s.departmentId!==depId)return alert('Không được phép chấm công cho học viên không thuộc khoa/phòng được phân công');

  s.attendanceLog=s.attendanceLog||[];
  let date=val('attDateNC-'+id),status=val('attStatusNC-'+id),note=val('attNoteNC-'+id);
  if(!date)return alert('Chọn ngày điểm danh');

  let existed=s.attendanceLog.find(l=>l.date===date);
  if(existed&&existed.status==='Có mặt'&&status!=='Có mặt')s.attendance=Math.max((s.attendance||0)-1,0);
  if((!existed||existed.status!=='Có mặt')&&status==='Có mặt')s.attendance=(s.attendance||0)+1;

  if(existed){
    existed.status=status;
    existed.note=note;
    existed.department=dep(s.departmentId).name;
    existed.instructor=ins(s.instructorId).name;
  }else{
    s.attendanceLog.unshift({date,status,note,department:dep(s.departmentId).name,instructor:ins(s.instructorId).name});
  }
  log('Điều dưỡng trưởng chấm công',s.name+' - '+date+' - '+status);
  save();
  render();
}

function markAttendance(id){let s=state.students.find(x=>x.id===id);s.attendanceLog=s.attendanceLog||[];let date=val('attDate-'+id),status=val('attStatus-'+id),note=val('attNote-'+id);if(!date)return alert('Chọn ngày điểm danh');let existed=s.attendanceLog.find(l=>l.date===date);if(existed&&existed.status==='Có mặt'&&status!=='Có mặt')s.attendance=Math.max((s.attendance||0)-1,0);if((!existed||existed.status!=='Có mặt')&&status==='Có mặt')s.attendance=(s.attendance||0)+1;if(existed){existed.status=status;existed.note=note;existed.department=dep(s.departmentId).name;existed.instructor=ins(s.instructorId).name}else{s.attendanceLog.unshift({date,status,note,department:dep(s.departmentId).name,instructor:ins(s.instructorId).name})}log('Điểm danh theo ngày',s.name+' - '+date+' - '+status);save();render()}
function plus(id,k){state.students.find(x=>x.id===id)[k]++;save();render()}
function checkExam(id){let s=state.students.find(x=>x.id===id),c=course(s.courseId);let passes=(s.subjectPasses||[]).length;let maxLevel=Math.max(...(s.competencies||[]).map(x=>+x.independentLevel||0),0); if(s.attendance>=c.attendance&&s.recordsSubmitted>=c.records&&passes>=3&&maxLevel>=3)s.status='Đủ điều kiện thi tốt nghiệp'; else alert('Chưa đủ điều kiện thi tốt nghiệp. Cần đủ ngày công, đủ bệnh án, có ít nhất 3 lần thi qua môn và mức độc lập thực hành từ 3 trở lên.');save();render()}
function graduation(){return title('Tốt nghiệp','Bảng kiểm điều kiện trước khi trình giám đốc ký: ngày công, bệnh án, 3 lần qua môn, mức độc lập, điểm tốt nghiệp và nhận xét')+cards(state.students,s=>{let c=course(s.courseId);let passes=(s.subjectPasses||[]).length;let maxLevel=Math.max(...(s.competencies||[]).map(x=>+x.independentLevel||0),0);let okAttendance=(s.attendance||0)>=c.attendance;let okRecords=(s.recordsSubmitted||0)>=c.records;let okPasses=passes>=3;let okLevel=maxLevel>=3;let okScore=s.score&&+s.score>=5;let okComment=!!s.comment;let allOk=okAttendance&&okRecords&&okPasses&&okLevel&&okScore&&okComment;let row=(name,ok,detail)=>`<div class="flex justify-between gap-3 border-b py-2"><div><b>${name}</b><div class="text-sm text-slate-500">${detail}</div></div><span class="px-3 py-1 rounded-full text-xs font-bold h-fit ${ok?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}">${ok?'Đạt':'Chưa đạt'}</span></div>`;return `<div class="flex justify-between gap-3 mb-3"><div><b class="text-lg">${s.name}</b><div class="text-sm text-slate-500">${s.id} · ${course(s.courseId).name} · ${dep(s.departmentId).name}</div></div>${badge(s.status)}</div><div class="bg-slate-50 rounded-2xl p-4 mb-4">${row('Ngày công thực hành',okAttendance,`${s.attendance||0}/${c.attendance} ngày công`)}${row('Bệnh án/hồ sơ chuyên môn',okRecords,`${s.recordsSubmitted||0}/${c.records} bệnh án đạt`)}${row('Thi qua môn',okPasses,`${passes}/3 lần qua môn bắt buộc`)}${row('Mức độc lập thực hành',okLevel,`Mức cao nhất ${maxLevel}/5; yêu cầu từ mức 3 trở lên`)}${row('Điểm tốt nghiệp',okScore,`${s.score||'Chưa nhập'}; yêu cầu >= 5/10`)}${row('Nhận xét của khoa/người hướng dẫn',okComment,`${s.comment?'Đã nộp nhận xét':'Chưa nộp nhận xét'}`)}</div><div class="grid md:grid-cols-2 gap-2"><input id="score-${s.id}" value="${s.score||''}" type="number" min="0" max="10" class="border rounded-xl p-2" placeholder="Điểm tốt nghiệp 0-10"><label class="border rounded-xl p-2"><input id="comment-${s.id}" type="checkbox" ${s.comment?'checked':''}> Đã nộp nhận xét</label></div><div class="mt-3 ${allOk?'bg-green-50 text-green-700 border-green-100':'bg-amber-50 text-amber-800 border-amber-100'} border rounded-2xl p-3 text-sm"><b>${allOk?'Đủ điều kiện trình ký':'Chưa đủ điều kiện trình ký'}</b><br>Hệ thống chỉ cho trình giám đốc ký khi toàn bộ bảng kiểm đều đạt.</div><div class="flex flex-wrap gap-2 mt-3"><button onclick="submitCert('${s.id}')" class="bg-orange-600 text-white rounded-xl px-3 py-2">Trình giám đốc ký</button><button onclick="previewGraduationChecklist('${s.id}')" class="bg-slate-900 text-white rounded-xl px-3 py-2">In bảng kiểm</button></div>`})}
function submitCert(id){let s=state.students.find(x=>x.id===id),c=course(s.courseId);let passes=(s.subjectPasses||[]).length;let maxLevel=Math.max(...(s.competencies||[]).map(x=>+x.independentLevel||0),0);s.score=val('score-'+id);s.comment=document.getElementById('comment-'+id).checked;if(s.attendance<c.attendance)return alert('Chưa đủ điều kiện: thiếu ngày công thực hành theo quy định khóa học');if(s.recordsSubmitted<c.records)return alert('Chưa đủ điều kiện: thiếu số bệnh án/hồ sơ chuyên môn đạt yêu cầu');if(passes<3)return alert('Chưa đủ điều kiện thi tốt nghiệp: cần tối thiểu 3 lần thi qua môn');if(maxLevel<3)return alert('Chưa đủ điều kiện: mức độ độc lập thực hành phải đạt từ mức 3 trở lên');if(!s.score||+s.score<5)return alert('Chưa đủ điều kiện: điểm tốt nghiệp phải >=5/10');if(!s.comment)return alert('Chưa đủ điều kiện: cần có nhận xét của khoa/người hướng dẫn');s.submitted=true;s.status='Chờ giám đốc ký';log('Trình ký giấy xác nhận',s.name);save();render()}
function previewGraduationChecklist(id){let s=state.students.find(x=>x.id===id),c=course(s.courseId);let passes=(s.subjectPasses||[]).length;let maxLevel=Math.max(...(s.competencies||[]).map(x=>+x.independentLevel||0),0);let w=window.open('','_blank');w.document.write(`<div style="font-family:Arial;padding:40px;line-height:1.6"><h2>BẢNG KIỂM ĐIỀU KIỆN THI TỐT NGHIỆP</h2><p><b>Học viên:</b> ${s.name} - ${s.id}</p><p><b>Khóa:</b> ${c.name}</p><table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%"><tr><th>Tiêu chí</th><th>Kết quả</th><th>Yêu cầu</th></tr><tr><td>Ngày công</td><td>${s.attendance||0}</td><td>${c.attendance}</td></tr><tr><td>Bệnh án đạt</td><td>${s.recordsSubmitted||0}</td><td>${c.records}</td></tr><tr><td>Thi qua môn</td><td>${passes}</td><td>Tối thiểu 3 lần</td></tr><tr><td>Mức độc lập thực hành</td><td>${maxLevel}/5</td><td>Từ mức 3 trở lên</td></tr><tr><td>Điểm tốt nghiệp</td><td>${s.score||'Chưa nhập'}</td><td>>= 5/10</td></tr><tr><td>Nhận xét</td><td>${s.comment?'Đã nộp':'Chưa nộp'}</td><td>Bắt buộc</td></tr></table><button onclick="window.print()" style="margin-top:20px;padding:10px 16px">In / lưu PDF</button></div>`)}
function tuitionPage(){return title('Quy định học phí theo chuyên ngành','Admin có quyền sửa số tiền, thời gian thực hành, chỉ tiêu ngày công và số bệnh án')+`<div class="bg-white rounded-3xl p-5 overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-slate-500 border-b"><th class="py-3">Chuyên ngành</th><th>Tên khóa</th><th>Thời gian</th><th>Học phí</th><th>Ngày công</th><th>Bệnh án</th><th></th></tr></thead><tbody>${state.courses.map(c=>`<tr class="border-b"><td class="py-3"><input id="major-${c.id}" value="${c.major}" class="border rounded-xl p-2 w-full"></td><td><input id="name-${c.id}" value="${c.name}" class="border rounded-xl p-2 w-full"></td><td><input id="duration-${c.id}" value="${c.duration}" class="border rounded-xl p-2 w-28"></td><td><input id="fee-${c.id}" type="number" value="${c.fee}" class="border rounded-xl p-2 w-36"></td><td><input id="attendance-${c.id}" type="number" value="${c.attendance}" class="border rounded-xl p-2 w-24"></td><td><input id="records-${c.id}" type="number" value="${c.records}" class="border rounded-xl p-2 w-24"></td><td><button onclick="saveCourse('${c.id}')" class="bg-blue-600 text-white rounded-xl px-3 py-2">Lưu</button></td></tr>`).join('')}</tbody></table><div class="mt-4 bg-blue-50 border border-blue-100 rounded-2xl p-4 text-sm text-blue-800">Khi admin sửa học phí, màn hình đăng ký online của học viên và tài khoản học viên sẽ tự hiển thị số tiền mới theo chuyên ngành.</div></div>`}
function saveCourse(id){let c=state.courses.find(x=>x.id===id);c.major=val('major-'+id);c.name=val('name-'+id);c.duration=val('duration-'+id);c.fee=+val('fee-'+id)||0;c.attendance=+val('attendance-'+id)||0;c.records=+val('records-'+id)||0;COURSES=state.courses;log('Cập nhật quy định học phí',c.major+' - '+money(c.fee));save();render()}
function orgPage(){return title('Khoa phòng & người hướng dẫn','Admin có quyền thêm/sửa tên khoa phòng, chỉ tiêu và quản lý người hướng dẫn')+`<div class="grid xl:grid-cols-2 gap-4"><div class="bg-white rounded-3xl p-5"><h2 class="text-xl font-extrabold mb-3">Khoa/phòng</h2><div class="grid md:grid-cols-3 gap-2 mb-4"><input id="newDep" class="border rounded-xl p-2 md:col-span-2" placeholder="Tên khoa/phòng"><input id="newQuota" type="number" class="border rounded-xl p-2" placeholder="Chỉ tiêu"></div><button onclick="addDepartment()" class="bg-blue-600 text-white rounded-xl px-4 py-2 mb-4">Thêm khoa/phòng</button>${state.departments.map(d=>`<div class="border-b py-3"><div class="grid md:grid-cols-4 gap-2 items-center"><input id="depName-${d.id}" value="${d.name}" class="border rounded-xl p-2 md:col-span-2"><input id="depQuota-${d.id}" type="number" value="${d.quota}" class="border rounded-xl p-2"><div class="flex gap-2"><button onclick="saveDepartment('${d.id}')" class="bg-blue-600 text-white rounded-xl px-3 py-2">Lưu</button><button onclick="removeDepartment('${d.id}')" class="text-red-600 border rounded-xl px-3 py-2">Xóa</button></div></div><div class="text-sm text-slate-500 mt-1">Đang xếp: ${state.students.filter(s=>s.departmentId===d.id&&s.status==='Đang thực hành').length}/${d.quota} học viên · Người hướng dẫn: ${state.instructors.filter(i=>i.departmentId===d.id).length}</div></div>`).join('')}</div><div class="bg-white rounded-3xl p-5"><h2 class="text-xl font-extrabold mb-3">Người hướng dẫn</h2><div class="grid md:grid-cols-2 gap-2 mb-4"><input id="newIns" class="border rounded-xl p-2" placeholder="Họ tên"><input id="newTitle" class="border rounded-xl p-2" placeholder="Chức danh"><input id="newPhone" class="border rounded-xl p-2" placeholder="Điện thoại"><select id="newInsDep" class="border rounded-xl p-2">${state.departments.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select></div><button onclick="addInstructor()" class="bg-emerald-600 text function addDepartment(){let name=val('newDep'),quota=+val('newQuota')||10;if(!name)return alert('Nhập tên khoa/phòng');let id='d'+Date.now();state.departments.push({id,name,quota});log('Thêm khoa/phòng',name);save();render()}
function saveDepartment(id){let d=state.departments.find(x=>x.id===id);let name=val('depName-'+id),quota=+val('depQuota-'+id)||0;if(!name)return alert('Tên khoa/phòng không được để trống');if(quota<1)return alert('Chỉ tiêu phải lớn hơn 0');d.name=name;d.quota=quota;log('Cập nhật khoa/phòng',name+' - chỉ tiêu '+quota);save();render()}
function removeDepartment(id){if(state.students.some(s=>s.departmentId===id))return alert('Không thể xóa vì đang có học viên thuộc khoa/phòng này');state.departments=state.departments.filter(d=>d.id!==id);state.instructors=state.instructors.filter(i=>i.departmentId!==id);log('Xóa khoa/phòng',id);save();render()}

function resetUserPassword(id){let a=state.accounts.find(x=>x.id===id);a.password='123456';log('Reset mật khẩu tài khoản',a.name);save();alert('Đã đặt lại mật khẩu về 123456 cho '+a.name);render()}

function deleteStudentAccount(id){let a=state.accounts.find(x=>x.id===id);if(!a)return alert('Không tìm thấy tài khoản');if(a.role!=='student')return alert('Chức năng này chỉ dùng để xóa học viên');let s=state.students.find(x=>x.id===a.link);if(!s)return alert('Không tìm thấy hồ sơ học viên liên kết');if(s.certificate||s.status==='Hoàn thành'||s.locked)return alert('Không thể xóa học viên đã hoàn thành, đã khóa hồ sơ hoặc đã được giám đốc ký xác nhận');if(!confirm('Xóa học viên '+s.name+'? Hệ thống sẽ xóa kèm tài khoản đăng nhập và dữ liệu liên quan trong bản demo.'))return;state.students=state.students.filter(x=>x.id!==s.id);state.accounts=state.accounts.filter(x=>x.id!==id&&x.link!==s.id);log('Admin xóa học viên từ phân quyền tài khoản',s.id+' - '+s.name);save();render()}
function reports(){
  let f=state.reportFilters||{};
  let majorList=[...new Set((COURSES||[]).map(c=>c.major).filter(Boolean))].sort();
  let classTypeList=[...new Set((state.classes||[]).map(c=>c.type).filter(Boolean))].sort();
  if(!classTypeList.includes('Chưa phân lớp')) classTypeList.unshift('Chưa phân lớp');
  let depList=state.departments||[];
  let statusList=[...new Set((state.students||[]).map(s=>s.status).filter(Boolean))].sort();

  let list=getReportFilteredStudents();

  let majorOptions=`<option value="">Tất cả chuyên ngành</option>`+
    majorList.map(m=>`<option value="${m}" ${f.major===m?'selected':''}>${m}</option>`).join('');
  let classTypeOptions=`<option value="">Tất cả loại lớp</option>`+
    classTypeList.map(t=>`<option value="${t}" ${f.classType===t?'selected':''}>${t}</option>`).join('');
  let depOptions=`<option value="">Tất cả khoa/phòng</option>`+
    depList.map(d=>`<option value="${d.id}" ${(f.departmentId||'')===d.id?'selected':''}>${d.name}</option>`).join('');
  let statusOptions=`<option value="">Tất cả trạng thái</option>`+
    statusList.map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${s}</option>`).join('');

  return title('Báo cáo','Tìm kiếm & lọc theo tên học viên, **loại lớp**; đồng thời xuất CSV/in theo dữ liệu đang lọc')+
    `
    <div class="bg-white rounded-3xl p-5 mb-4">
      <div class="grid md:grid-cols-5 gap-3">
        <input id="rfQuery" class="border rounded-xl p-3" placeholder="Tìm theo tên/mã/SĐT" value="${f.query||''}" />
        <select id="rfMajor" class="border rounded-xl p-3">${majorOptions}</select>
        <select id="rfClassType" class="border rounded-xl p-3">${classTypeOptions}</select>
        <select id="rfDepartmentId" class="border rounded-xl p-3">${depOptions}</select>
        <select id="rfStatus" class="border rounded-xl p-3">${statusOptions}</select>
      </div>
      <div class="flex flex-wrap gap-2 mt-3">
        <button onclick="applyReportFilters()" class="bg-blue-600 text-white rounded-xl px-4 py-3 font-bold">Áp dụng</button>
        <button onclick="clearReportFilters()" class="border rounded-xl px-4 py-3 font-bold">Xóa lọc</button>
        <button onclick="exportCSV()" class="bg-emerald-600 text-white rounded-xl px-4 py-3 font-bold">Xuất CSV theo bộ lọc</button>
        <button onclick="window.print()" class="bg-slate-900 text-white rounded-xl px-4 py-3 font-bold">In / lưu PDF (bảng đang lọc)</button>
      </div>
      <div class="text-sm text-slate-500 mt-2">Tổng: <b>${list.length}</b> học viên</div>
    </div>
    `+table(list);
}

function getReportFilteredStudents(){
  let f=state.reportFilters||{};
  let query=(f.query||'').toLowerCase().trim();
  let major=(f.major||'').trim();
  let classType=(f.classType||'').trim();
  let departmentId=(f.departmentId||'').trim();
  let status=(f.status||'').trim();

  return (state.students||[]).filter(s=>{
    let qOk=!query || [s.id,s.name,s.phone].some(v=>String(v||'').toLowerCase().includes(query));
    let mOk=!major || course(s.courseId).major===major;
    let ctOk=!classType || cls(s.classId).type===classType;
    let dOk=!departmentId || s.departmentId===departmentId;
    let stOk=!status || s.status===status;
    return qOk && mOk && ctOk && dOk && stOk;
  });
}

function applyReportFilters(){
  let query=(val('rfQuery')||'').trim();
  let major=(val('rfMajor')||'').trim();
  let classType=(val('rfClassType')||'').trim();
  let departmentId=(val('rfDepartmentId')||'').trim();
  let status=(val('rfStatus')||'').trim();

  let next={};
  if(query) next.query=query;
  if(major) next.major=major;
  if(classType) next.classType=classType;
  if(departmentId) next.departmentId=departmentId;
  if(status) next.status=status;

  state.reportFilters=next;
  render();
}

function clearReportFilters(){
  state.reportFilters={};
  render();
}

function exportCSV(){
  let list=getReportFilteredStudents();
  let csv='Ma,Hoc vien,Chuyen nganh,Loai lop,Khoa,Người huong dan,Trang thai\n'+
    (list||[]).map(s=>{
      let row=[
        s.id,
        s.name,
        course(s.courseId).major,
        cls(s.classId).type,
        dep(s.departmentId).name,
        ins(s.instructorId).name,
        s.status
      ];
      return row.map(x=>'"'+String(x||'').replace(/"/g,'""')+'"').join(',');
    }).join('\n');
  let b=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='bao-cao-hoc-vien-theo-loai-lop.csv';
  a.click();
}
